name: PR flow

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  pr-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v5
      - name: Validate PR flow and sync issue labels
        uses: ./.github/actions/flow-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

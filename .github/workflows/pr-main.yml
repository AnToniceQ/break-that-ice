name: Main PR Production Build

on:
  pull_request:
    branches:
      - main

jobs:
  production-build-validation:
    name: production-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for production validation
        run: |
          npm run build:app:clear
          MINIFY_BACKEND_BUILD=true npm run build:app

name: Setup Node For Actions
description: Checkout repository with action folders and set up Node.js

inputs:
  node-version:
    description: Node version
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        sparse-checkout: |
          package.json
          package-lock.json
          .github
        sparse-checkout-cone-mode: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

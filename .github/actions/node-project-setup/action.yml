name: Setup Node Project
description: Checkout repository and set up Node.js

inputs:
  node-version:
    description: Node version
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

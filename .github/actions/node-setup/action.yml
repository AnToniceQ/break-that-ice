name: Setup Node Project
description: Set up Node.js for repository workflows

inputs:
  node-version:
    description: Node version
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
